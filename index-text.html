<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NILEST :-: Transcript Application System</title>
  <link rel="stylesheet" href="./assests/css/index.css">
</head>
<body>
  <main>
   <div class="container">
     <div class="logo"><img src="./assests/images/nilest-logo.png" alt="">
    </div>
    <div class="apply-dash">
      <div class="apply">
        <h4>How to Apply for Transcript</h4>
        <p> -> Login <a href="#">here</a> to access student Dashboard.</p>
        <p> -> Click on Apply.</p>
        <p> -> Fill in the correct recipient address.</p>
        <p> -> Click on Submit.</p>
        <p> -> On the Dashboard you can access the <strong>Status</strong> menu to verify your status of your apllication.</p>
      </div>
      <div class="staff-login">
        <h4>Staff Login</h4>
        <form action="#">
          <input type="text" name="reg-no" id="reg-no" placeholder="Registration Number">
          <input type="text" name="state-origin" id="state-origin" placeholder="State of Origin">
          <button type="submit" class="submit">Login</button>
          <button type="reset" class="reset">Clear</button>
        </form>
      </div>
    </div>
   </div>
  </main>
</body>
</html>
